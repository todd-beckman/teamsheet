<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teamsheet — VGC Team List</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-main">
      <!-- Player &amp; event information form -->
      <section class="card" id="player-form-section">
        <h2>Player Information</h2>
        <div id="player-form"></div>
      </section>

      <!-- Team toolbar: import button -->
      <section class="card" id="team-section">
        <div class="team-toolbar">
          <h2>Pokémon Team</h2>
          <div id="import-button-container"></div>
        </div>
        <div id="team-table"></div>
      </section>

      <!-- Export controls -->
      <section class="card" id="export-section">
        <div id="export-button-container"></div>
      </section>
    </main>

    <!-- Mount point for the import modal -->
    <div id="modal-root"></div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
